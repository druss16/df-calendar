<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&F CPAs — 30-Day Social Media Content Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1B5C4E;
    --green-mid: #2a7a68;
    --green-light: #e8f5f1;
    --green-pale: #f4fbf8;
    --gold: #C9A84C;
    --gold-light: #fdf6e3;
    --text: #1a1a1a;
    --text-muted: #5a5a5a;
    --text-light: #8a8a8a;
    --border: #e8e8e4;
    --white: #ffffff;
    --bg: #fafaf8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* HEADER */
  header {
    background: var(--green);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 20px,
      rgba(255,255,255,0.03) 20px,
      rgba(255,255,255,0.03) 21px
    );
  }
  .header-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.02em;
    line-height: 1.15;
    margin-bottom: 0.5rem;
  }
  header p {
    color: rgba(255,255,255,0.65);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.03em;
  }
  .header-meta {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1.75rem;
    flex-wrap: wrap;
  }
  .meta-pill {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    font-weight: 400;
    padding: 6px 16px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }

  /* CONTROLS */
  .controls {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .controls-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-light);
    margin-right: 4px;
  }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 0.02em;
  }
  .filter-btn:hover { border-color: var(--green); color: var(--green); }
  .filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

  /* MAIN */
  main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* WEEK BLOCK */
  .week-block { margin-bottom: 3rem; }
  .week-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--green);
  }
  .week-num {
    background: var(--green);
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 3px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .week-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--green);
    letter-spacing: 0.02em;
  }
  .week-days { font-size: 12px; color: var(--text-light); margin-left: auto; }

  /* DAY CARD */
  .day-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1rem;
    overflow: hidden;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }
  .day-card:hover { box-shadow: 0 4px 24px rgba(27,92,78,0.08); transform: translateY(-1px); }
  .card-top {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid var(--border);
  }
  .day-number {
    background: var(--green-pale);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 64px;
    padding: 1rem 0.75rem;
    text-align: center;
  }
  .day-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); font-weight: 500; }
  .day-num-val { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: var(--green); line-height: 1; }
  .card-meta {
    flex: 1;
    padding: 0.75rem 1.25rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }
  .card-title {
    width: 100%;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
    line-height: 1.3;
  }
  .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge-pain    { background: #FCEBEB; color: #A32D2D; }
  .badge-edu     { background: #E6F1FB; color: #185FA5; }
  .badge-trust   { background: #E1F5EE; color: #0F6E56; }
  .badge-cta     { background: #FAEEDA; color: #854F0B; }
  .badge-culture { background: #EEEDFE; color: #3C3489; }
  .badge-platform { background: #f0f0ec; color: #5a5a5a; }

  .card-body { padding: 1.25rem 1.5rem; }
  .copy-text {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.75;
    margin-bottom: 1rem;
    white-space: pre-line;
  }
  .cta-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--green-light);
    border-radius: 7px;
    padding: 0.75rem 1rem;
    margin-bottom: 0.75rem;
  }
  .cta-icon {
    width: 20px;
    height: 20px;
    background: var(--green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .cta-icon svg { width: 10px; height: 10px; fill: white; }
  .cta-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--green); display: block; margin-bottom: 2px; }
  .cta-text { font-size: 13px; color: var(--green); font-weight: 500; line-height: 1.5; }

  .tip-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .tip-dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
  }
  .tip-text { font-size: 12px; color: var(--text-light); font-style: italic; line-height: 1.5; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 4rem 2rem; color: var(--text-light); font-size: 14px; }

  /* FOOTER */
  footer {
    background: var(--green);
    color: rgba(255,255,255,0.6);
    text-align: center;
    padding: 1.5rem;
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  footer strong { color: rgba(255,255,255,0.9); }

  @media (max-width: 600px) {
    header { padding: 2rem 1rem 1.75rem; }
    .controls { padding: 0.75rem 1rem; }
    main { padding: 1.5rem 1rem 3rem; }
    .day-number { min-width: 52px; }
    .card-body { padding: 1rem 1rem; }
  }
</style>
</head>

  {day:4,week:1,wt:"Tax Season Aftermath",theme:"pain",tl:"Pain Point",platform:"FB + LI",title:"The most expensive words in business: 'I didn't know I could do that.'",copy:"S-corp election. Augusta Rule. Solo 401k. Qualified Business Income deduction. These aren't loopholes — they're legal strategies that thousands of business owners miss every single year because their CPA never brought them up. What strategies are you missing?",cta:"Comment MISSED and we'll DM you a free list of the top 10 strategies most business owners overlook.",tip:"Drives DMs and comments — two of the best engagement signals."},

  {day:6,week:1,wt:"Tax Season Aftermath",theme:"trust",tl:"Trust Building",platform:"FB",title:"Meet the team — Dauphin & Fantacone CPAs",copy:"We built D&F on a simple belief: every business deserves the same quality of financial guidance that Fortune 500 companies get — with the personal attention and white-glove service that only a dedicated firm can provide. Big firm expertise. Small firm heart. That's us.",cta:"Follow our page so you never miss a weekly tax tip — we post strategies most CPAs keep to themselves.",tip:"Follow CTA keeps people on platform — algorithm friendly."},

  {day:11,week:2,wt:"Frustration & Missed Strategies",theme:"pain",tl:"Pain Point",platform:"FB",title:"Real talk: Tax season shouldn't feel like this.",copy:"Dreading the call from your accountant. Scrambling to find receipts. Writing a check you weren't prepared for. If that was your April, let's make sure it's the last one that looks like that. Planning starts now — not next January.",cta:"Drop a comment if this was your April — you're not alone, and it's fixable.",tip:"Vulnerability-style prompt. Reply to all comments personally."},

  {day:18,week:3,wt:"Authority & Expertise",theme:"pain",tl:"Pain Point",platform:"FB + LI",title:"The cost of a bad CPA isn't just a higher tax bill.",copy:"It's missed deductions. It's wrong entity structure. It's no retirement strategy. It's compliance errors that trigger audits. It's showing up to a conversation with your bank or investors without clean financials. The right CPA pays for themselves many times over.",cta:"Save this post — and share it with a business owner who's never thought about it this way.",tip:"Save prompt is one of LinkedIn's strongest reach signals."},

const weekRanges = {1:"Days 1–7",2:"Days 8–14",3:"Days 15–21",4:"Days 22–28",5:"Days 29–30"};
let activeFilter = 'all';

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const visible = activeFilter === 'all' ? posts : posts.filter(p => p.theme === activeFilter);
  if (!visible.length) { main.innerHTML = '<div class="empty">No posts match this filter.</div>'; return; }

  let currentWeek = 0;
  let weekEl = null;

  visible.forEach(p => {
    if (p.week !== currentWeek) {
      currentWeek = p.week;
      weekEl = document.createElement('div');
      weekEl.className = 'week-block';
      weekEl.innerHTML = `<div class="week-header">
        <span class="week-num">Week ${p.week}</span>
        <span class="week-title">${p.wt}</span>
        <span class="week-days">${weekRanges[p.week]}</span>
      </div>`;
      main.appendChild(weekEl);
    }

    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div class="card-top">
        <div class="day-number">
          <span class="day-label">Day</span>
          <span class="day-num-val">${p.day}</span>
        </div>
        <div class="card-meta">
          <div class="card-title">${p.title}</div>
          <span class="badge badge-${p.theme}">${p.tl}</span>
          <span class="badge badge-platform">${p.platform}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="copy-text">${p.copy}</div>
        <div class="cta-row">
          <div class="cta-icon">
            <svg viewBox="0 0 10 10"><path d="M5 1l1.5 3h3l-2.5 1.8 1 3L5 7.2 2 8.8l1-3L.5 4h3z"/></svg>
          </div>
          <div>
            <span class="cta-label">Algorithm-Safe CTA</span>
            <div class="cta-text">${p.cta}</div>
          </div>
        </div>
        <div class="tip-row">
          <div class="tip-dot"></div>
          <div class="tip-text">${p.tip}</div>
        </div>
      </div>`;
    weekEl.appendChild(card);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

render();
</script>
</body>
</html>
